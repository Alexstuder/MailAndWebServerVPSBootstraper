<svg width="100%" viewBox="0 0 680 1060" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif;">
<defs>
  <style>
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .tu { font-size: 10px; font-weight: 400; fill: #888; }
    .c-gray-fill   { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-blue-fill   { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue-dark   { fill: #B5D4F4; stroke: #185FA5; }
    .c-teal-fill   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-purple-fill { fill: #EEEDFE; stroke: #534AB7; }
    .c-amber-fill  { fill: #FAEEDA; stroke: #854F0B; }
    .c-coral-fill  { fill: #FAECE7; stroke: #993C1D; }
    .c-green-fill  { fill: #EAF3DE; stroke: #3B6D11; }
    .c-net-fill    { fill: rgba(180,178,169,0.10); stroke: #B4B2A9; }
    .c-violet-fill { fill: #F3EFFE; stroke: #6D28D9; }
    .c-slate-fill  { fill: #F0F4FF; stroke: #3B5BDB; }
    .th-blue   { fill: #0C447C; }
    .th-teal   { fill: #085041; }
    .th-purple { fill: #3C3489; }
    .th-amber  { fill: #633806; }
    .th-coral  { fill: #712B13; }
    .th-green  { fill: #27500A; }
    .th-gray   { fill: #444441; }
    .th-violet { fill: #4C1D95; }
    .th-slate  { fill: #1E3A8A; }
    .ts-blue   { fill: #185FA5; }
    .ts-teal   { fill: #0F6E56; }
    .ts-purple { fill: #534AB7; }
    .ts-amber  { fill: #854F0B; }
    .ts-coral  { fill: #993C1D; }
    .ts-green  { fill: #3B6D11; }
    .ts-gray   { fill: #5F5E5A; }
    .ts-violet { fill: #6D28D9; }
    .ts-slate  { fill: #3B5BDB; }
  </style>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- VPS — äusserer Rahmen -->
<rect x="20" y="20" width="640" height="1030" rx="16" class="c-gray-fill" stroke-width="0.5"/>
<text class="th th-gray" x="340" y="47" text-anchor="middle">VPS — Ubuntu 24.04</text>
<text class="ts ts-gray" x="340" y="64" text-anchor="middle">root + user</text>

<!-- Docker Engine -->
<rect x="40" y="78" width="600" height="634" rx="12" class="c-blue-fill" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="100" text-anchor="middle">Docker Engine</text>
<text class="ts ts-blue" x="340" y="116" text-anchor="middle">docker compose — App Stack</text>

<!-- Cloudflare Tunnel -->
<rect x="60" y="128" width="560" height="48" class="c-blue-dark" rx="8" stroke-width="1"/>
<text class="th th-blue" x="340" y="148" text-anchor="middle">Cloudflare Tunnel (cloudflared)</text>
<text class="ts ts-blue" x="340" y="164" text-anchor="middle">einziger Eingang von aussen — kein Port offen</text>

<!-- Subdomain labels -->
<text class="ts ts-gray" x="340" y="196" text-anchor="middle">*.domain.com (Wildcard Route)</text>
<line x1="340" y1="176" x2="340" y2="204" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- NGINX PROXY BOX -->
<rect x="60" y="208" width="560" height="64" rx="8" class="c-gray-fill" stroke-width="0.5"/>
<text class="th th-gray" x="340" y="228" text-anchor="middle">Nginx — Reverse Proxy &amp; Webserver</text>
<text class="ts ts-gray" x="340" y="244" text-anchor="middle">intern :80 — dynamisches Routing basierend auf .env Variablen</text>
<text class="tu" x="340" y="260" text-anchor="middle">Liefert zudem die statische Flutter App aus</text>

<!-- intern Rahmen -->
<rect x="56" y="284" width="568" height="150" rx="10" class="c-net-fill" stroke-width="1.2" stroke-dasharray="6 3"/>
<text class="ts ts-gray" x="340" y="300" text-anchor="middle" font-style="italic">intern - Docker Bridge-Netzwerk (vps-net)</text>

<!-- Pfeile Nginx zu Container -->
<line x1="100" y1="272" x2="100" y2="308" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#a)"/>
<line x1="260" y1="272" x2="260" y2="308" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#a)"/>
<line x1="420" y1="272" x2="420" y2="308" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#a)"/>
<line x1="580" y1="272" x2="580" y2="308" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#a)"/>

<!-- Poste.io -->
<rect x="55" y="310" width="90" height="110" rx="8" class="c-purple-fill" stroke-width="0.5"/>
<text class="th th-purple" x="100" y="330" text-anchor="middle">Poste.io</text>
<text class="ts ts-purple" x="100" y="346" text-anchor="middle">Webmail</text>
<text class="ts ts-purple" x="100" y="362" text-anchor="middle">vol: poste-data</text>
<text class="ts ts-purple" x="100" y="378" text-anchor="middle">SMTP / IMAP</text>

<!-- Supabase Stack (API) -->
<rect x="215" y="310" width="90" height="110" rx="8" class="c-teal-fill" stroke-width="0.5"/>
<text class="th th-teal" x="260" y="330" text-anchor="middle">Supabase API</text>
<text class="ts ts-teal" x="260" y="346" text-anchor="middle">Kong Gateway</text>
<text class="ts ts-teal" x="260" y="362" text-anchor="middle">Auth / Realtime</text>
<text class="tu" x="260" y="394" text-anchor="middle">Core Stack</text>

<!-- Supabase Studio/DB -->
<rect x="375" y="310" width="90" height="110" rx="8" class="c-blue-dark" stroke-width="0.5"/>
<text class="th th-blue" x="420" y="330" text-anchor="middle">PostgreSQL</text>
<text class="ts ts-blue" x="420" y="346" text-anchor="middle">Studio (UI)</text>
<text class="ts ts-blue" x="420" y="362" text-anchor="middle">vol: db-data</text>
<text class="ts ts-blue" x="420" y="394" text-anchor="middle">pg-meta</text>

<!-- Portainer -->
<rect x="535" y="310" width="90" height="110" rx="8" class="c-slate-fill" stroke-width="0.5"/>
<text class="th th-slate" x="580" y="330" text-anchor="middle">Portainer</text>
<text class="ts ts-slate" x="580" y="346" text-anchor="middle">Docker UI</text>
<text class="ts ts-slate" x="580" y="362" text-anchor="middle">vol: portainer</text>

<!-- Api to DB Line -->
<line x1="305" y1="365" x2="375" y2="365" stroke="#085041" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#a)"/>

<!-- Watchtower -->
<rect x="62" y="444" width="560" height="48" rx="8" class="c-green-fill" stroke-width="0.5"/>
<text class="th th-green" x="340" y="464" text-anchor="middle">Watchtower — Auto-Update (02:30 UTC)</text>
<text class="ts ts-green" x="340" y="480" text-anchor="middle">poste · nginx · portainer — Docker Socket</text>

<!-- Externe Anbindungen -->
<rect x="56" y="504" width="568" height="88" rx="10" class="c-net-fill" stroke-width="1.2" stroke-dasharray="6 3"/>
<text class="ts ts-gray" x="340" y="520" text-anchor="middle" font-style="italic">Externe Anbindungen</text>

<!-- Brevo/SMTP -->
<rect x="257" y="526" width="165" height="56" rx="8" class="c-amber-fill" stroke-width="0.5"/>
<text class="th th-amber" x="340" y="548" text-anchor="middle">SMTP Relay</text>
<text class="ts ts-amber" x="340" y="564" text-anchor="middle">Postausgang (Brevo/AWS)</text>

<!-- Verbindungen -->
<line x1="100" y1="420" x2="340" y2="524" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- unattended-upgrades -->
<rect x="40" y="726" width="600" height="40" rx="8" class="c-gray-fill" stroke-width="1"/>
<text class="th th-gray" x="200" y="750" text-anchor="middle">unattended-upgrades</text>
<text class="ts ts-gray" x="490" y="746" text-anchor="middle">Ubuntu Security + Docker Engine</text>
<text class="ts ts-gray" x="490" y="760" text-anchor="middle">täglich 03:00 UTC — Reboot 03:30 UTC</text>

<!-- GitHub -->
<rect x="40" y="782" width="600" height="56" rx="8" class="c-green-fill" stroke-width="0.5"/>
<text class="th th-green" x="340" y="804" text-anchor="middle">GitHub Repository</text>
<text class="ts ts-green" x="340" y="820" text-anchor="middle">bootstrap.sh · docker-compose.yml · .env.gpg · backup/</text>

<!-- Bitwarden -->
<rect x="40" y="854" width="290" height="64" rx="8" class="c-violet-fill" stroke-width="0.5"/>
<text class="th th-violet" x="185" y="878" text-anchor="middle">Bitwarden</text>
<text class="ts ts-violet" x="185" y="894" text-anchor="middle">BACKUP_MAIL_GPG_PASSWORD</text>
<text class="ts ts-violet" x="185" y="909" text-anchor="middle">GITHUB_MAIL_TOKEN</text>

<!-- Cloudflare R2 -->
<rect x="350" y="854" width="290" height="64" rx="8" class="c-blue-fill" stroke-width="0.5"/>
<text class="th th-blue" x="495" y="878" text-anchor="middle">Cloudflare R2</text>
<text class="ts ts-blue" x="495" y="894" text-anchor="middle">Backups — Supabase DB + Poste.io</text>

<!-- Pfeile -->
<line x1="185" y1="770" x2="185" y2="780" stroke="#6D28D9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>
<line x1="495" y1="770" x2="495" y2="780" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>
<line x1="185" y1="838" x2="185" y2="852" stroke="#6D28D9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>
<line x1="495" y1="838" x2="495" y2="852" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a)"/>

<!-- Zeitplan -->
<rect x="40" y="988" width="600" height="52" rx="8" class="c-gray-fill" stroke-width="0.5"/>
<text class="th th-gray" x="340" y="1008" text-anchor="middle">Automatischer Zeitplan (UTC)</text>
<text class="ts ts-gray" x="340" y="1026" text-anchor="middle">02:00 Backup Poste/DB → R2 · 02:30 Watchtower · 03:00 unattended-upgrades · 03:30 Reboot</text>

</svg>
